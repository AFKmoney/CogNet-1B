# CogNet 1B — Full FSDP Multi-GPU Config
model_size: "1b"
vocab_size: 32000
max_seq_len: 4096
dropout: 0.0
use_gradient_checkpointing: true

# Data
dataset_paths:
  - "wikimedia/wikipedia"
  - "bigcode/the-stack"
dataset_splits:
  - "train"
  - "train"
data_cache_dir: "./data_cache"
max_tokens: 50000000000  # 50B tokens
preprocessing_num_workers: 16

# Training
batch_size: 4  # per GPU
gradient_accumulation_steps: 8
max_lr: 3.0e-4
min_lr: 3.0e-5
warmup_steps: 2000
max_steps: 100000
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

# Precision
dtype: "bfloat16"

# Distributed
use_fsdp: true
compile_model: true

# Checkpointing
checkpoint_dir: "./checkpoints"
save_interval: 1000
eval_interval: 500
log_interval: 10
async_checkpoint: true

# Generation
gen_interval: 2000
gen_max_tokens: 64
gen_temperature: 0.8
gen_top_k: 40
