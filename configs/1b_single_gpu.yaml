# CogNet 1B — Single GPU Config
model_size: "1b"
vocab_size: 32000
max_seq_len: 2048
dropout: 0.0
use_gradient_checkpointing: true

# Data
dataset_paths:
  - "wikimedia/wikipedia"
  - "bigcode/the-stack"
dataset_splits:
  - "train"
  - "train"
data_cache_dir: "./data_cache"
max_tokens: 20000000000  # 20B tokens
preprocessing_num_workers: 8

# Training (reduced for single GPU)
batch_size: 2
gradient_accumulation_steps: 16
max_lr: 2.0e-4
min_lr: 2.0e-5
warmup_steps: 1000
max_steps: 100000
weight_decay: 0.1
beta1: 0.9
beta2: 0.95
grad_clip: 1.0

# Precision
dtype: "bfloat16"

# Distributed
use_fsdp: false
compile_model: true

# Checkpointing
checkpoint_dir: "./checkpoints"
save_interval: 2000
eval_interval: 1000
log_interval: 10
async_checkpoint: true

# Generation
gen_interval: 5000
gen_max_tokens: 64
gen_temperature: 0.8
gen_top_k: 40
